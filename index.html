<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><title>MedLife OS v2</title><link rel='stylesheet' href='style.css'></head><body><div class='sidebar'><h2>MedLife OS</h2><button onclick="showPage('dashboard')">Dashboard</button><button onclick="showPage('goals')">Goals</button><button onclick="showPage('study')">Study</button><button onclick="showPage('sleep')">Sleep</button><button onclick="showPage('notes')">Notes</button></div><div class='content'><section id='dashboard'>Welcome to MedLife OS v2</section><section id='goals' style='display:none'><input id='goal'><button onclick='addGoal()'>Add Goal</button><ul id='goalsList'></ul></section><section id='study' style='display:none'><input id='studyHours' type='number'><button onclick='saveStudy()'>Save</button><p id='studyOut'></p></section><section id='sleep' style='display:none'><input id='sleepHours' type='number' step='0.5'><button onclick='saveSleep()'>Save</button><p id='sleepOut'></p></section><section id='notes' style='display:none'><textarea id='note'></textarea><button onclick='saveNote()'>Save Note</button><div id='notesOut'></div></section></div><script src='app.js'></script></body></html>
