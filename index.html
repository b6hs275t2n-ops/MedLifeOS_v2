<!DOCTYPE html><html><head><meta name='viewport' content='width=device-width,initial-scale=1'><title>MedLife OS v2</title><link rel='stylesheet' href='style.css'></head><body><div class='sidebar'><h2>MedLife OS</h2><button onclick="showPage('dashboard')">Dashboard</button><button onclick="showPage('goals')">Goals</button><button onclick="showPage('study')">Study</button><button onclick="showPage('sleep')">Sleep</button><button onclick="showPage('notes')">Notes</button></div><div class='content'><section id='dashboard'>Welcome to MedLife OS v2</section><section id='goals' style='display:none'><input id='goal'><button onclick='addGoal()'>Add Goal</button><ul id='goalsList'></ul></section><section id='study' style='display:none'><input id='studyHours' type='number'><button onclick='saveStudy()'>Save</button><p id='studyOut'></p></section><section id='sleep' style='display:none'><input id='sleepHours' type='number' step='0.5'><button onclick='saveSleep()'>Save</button><p id='sleepOut'></p></section><section id='notes' style='display:none'><textarea id='note'></textarea><button onclick='saveNote()'>Save Note</button><div id='notesOut'></div></section></div><script src='app.js'></script></body></html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedLife OS v2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:#111827;
padding:20px;
border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:28px;
font-weight:700;
margin-bottom:30px;
}

.menu button{
width:100%;
padding:14px;
margin-bottom:10px;
background:#1e293b;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
text-align:left;
}

.menu button:hover{
background:#2563eb;
}

.main{
flex:1;
padding:25px;
}

.top{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
}

.card h3{
font-size:14px;
opacity:.7;
margin-bottom:8px;
}

.big{
font-size:32px;
font-weight:700;
}

.section{
margin-top:20px;
}

.subject{
margin:15px 0;
}

.bar{
height:12px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
background:#3b82f6;
}

input{
padding:12px;
border:none;
border-radius:12px;
width:70%;
}

.addBtn{
padding:12px 18px;
border:none;
background:#2563eb;
color:white;
border-radius:12px;
cursor:pointer;
}

.goal{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-top:10px;
}

@media(max-width:768px){
body{
flex-direction:column;
}
.sidebar{
width:100%;
}
}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">🩺 MedLife OS</div>

<div class="menu">
<button>🏠 Dashboard</button>
<button>📚 Study Planner</button>
<button>🎯 Goals</button>
<button>📝 Notes</button>
<button>📊 Analytics</button>
<button>⚙️ Settings</button>
</div>

</div>

<div class="main">

<div class="top">

<div class="card">
<h3>NEET PG Countdown</h3>
<div class="big" id="countdown">--</div>
</div>

<div class="card">
<h3>Study Hours Today</h3>
<div class="big">6.5h</div>
</div>

<div class="card">
<h3>Current Streak</h3>
<div class="big">14 🔥</div>
</div>

</div>

<div class="card">

<h2>Subject Progress</h2>

<div class="subject">
Microbiology
<div class="bar">
<div class="fill" style="width:80%"></div>
</div>
</div>

<div class="subject">
Pharmacology
<div class="bar">
<div class="fill" style="width:65%"></div>
</div>
</div>

<div class="subject">
Pathology
<div class="bar">
<div class="fill" style="width:45%"></div>
</div>
</div>

</div>

<div class="section">

<div class="card">

<h2>Today's Goals</h2>

<br>

<input id="goalInput" placeholder="Enter Goal">

<button class="addBtn" onclick="addGoal()">
Add Goal
</button>

<div id="goalList"></div>

</div>

</div>

</div>

<script>

function addGoal(){

const input=document.getElementById("goalInput");

if(input.value==="") return;

const div=document.createElement("div");

div.className="goal";

div.innerHTML="✅ "+input.value;

document.getElementById("goalList").appendChild(div);

localStorage.setItem(
"goals",
document.getElementById("goalList").innerHTML
);

input.value="";
}

window.onload=()=>{

const examDate=new Date("2027-03-01");

const today=new Date();

const diff=Math.ceil(
(examDate-today)/(1000*60*60*24)
);

document.getElementById("countdown").innerText=
diff+" Days";

document.getElementById("goalList").innerHTML=
localStorage.getItem("goals") || "";
}

</script>

</body>
</html>
