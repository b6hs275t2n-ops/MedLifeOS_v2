<br>

<div class="card">

<h2>Today's Subjects</h2>

<br>

<div class="subject">
Microbiology
<div class="progress">
<div style="width:80%"></div>
</div>
</div>

<div class="subject">
Pharmacology
<div class="progress">
<div style="width:60%"></div>
</div>
</div>

<div class="subject">
Pathology
<div class="progress">
<div style="width:45%"></div>
</div>
</div>

<div class="subject">
Community Medicine
<div class="progress">
<div style="width:40%"></div>
</div>
</div>

</div>

<br>

<div class="card">

<h2>Pomodoro Timer</h2>

<br>

<h1 id="timer">25:00</h1>

<br>

<button onclick="startTimer()" id="themeBtn">
▶ Start
</button>

<button onclick="resetTimer()" id="themeBtn">
⟳ Reset
</button>

</div>

</div>

<script>

let time = 1500;
let interval;

function updateTimer(){

const minutes =
Math.floor(time/60);

const seconds =
time%60;

document.getElementById("timer")
.innerText =
String(minutes).padStart(2,"0")
+ ":"
+
String(seconds).padStart(2,"0");

}

function startTimer(){

clearInterval(interval);

interval = setInterval(()=>{

if(time>0){

time--;

updateTimer();

}

},1000);

}

function resetTimer(){

clearInterval(interval);

time = 1500;

updateTimer();

}

updateTimer();

</script>
